version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/devboard
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkey_for_dev
      - REFRESH_TOKEN_SECRET=supersecretrefreshtokenkey_for_dev
      - NODE_ENV=development
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
